<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>華語文教學選擇題練習</title><style>body{font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif;display:grid;place-items:center;min-height:100vh;margin:0;background:#f3f6fb;color:#182230}.box{max-width:620px;padding:28px;border:1px solid #d8e0ec;border-radius:18px;background:#fff;box-shadow:0 15px 42px rgba(31,46,78,.11)}.error{color:#b42318;white-space:pre-wrap}</style></head><body><div class="box" id="status"><h1>華語文教學題庫載入中</h1><p>正在載入 274 題線上練習網站……</p></div><script>(async()=>{try{const files=['part0.txt','part1.txt','part2.txt','part3.txt'];const parts=await Promise.all(files.map(async f=>{const r=await fetch(f);if(!r.ok)throw new Error('無法載入 '+f);return r.text()}));const b64=parts.join('').replace(/\s/g,'');const bin=atob(b64);const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));const html=await new Response(stream).text();document.open();document.write(html);document.close()}catch(e){document.getElementById('status').innerHTML='<h1>載入失敗</h1><p class="error">'+e.message+'</p><p>請使用最新版 Chrome、Edge 或 Safari。</p>'}})();</script></body></html>
